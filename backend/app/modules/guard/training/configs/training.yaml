dataset:
  source: huggingface
  huggingface_name: xTRam1/safe-guard-prompt-injection
  local_csv_path: data/prompts.csv
  text_column: prompt
  label_column: label
  valid_labels:
    - benign
    - suspicious
    - malicious

split:
  test_size: 0.2
  validation_size: 0.0
  random_state: 42
  stratify: true

model:
  output_dir: app/modules/guard/models/classifier
  device: auto
  max_length: 128

training:
  epochs: 3
  batch_size: 16
  learning_rate: 0.00002
  force_download: false

artifacts:
  root_dir: app/modules/guard/training/artifacts
  metrics_dir: app/modules/guard/training/artifacts/metrics
  reports_dir: app/modules/guard/training/artifacts/reports
  checkpoints_dir: app/modules/guard/training/artifacts/checkpoints

mlflow:
  enabled: false
  experiment_name: aegisai-guard-safety-classifier
